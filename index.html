<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:400,700" rel="stylesheet">
    <title>AURA</title>
    <style>
        body {
            font-family: 'Playfair Display', serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #fff;
            border-bottom: 2px solid gold;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav ul {
            list-style-type: none;
            display: flex;
            gap: 20px;
        }
        .hero {
            background: url('hero-banner.jpg') no-repeat center center;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            font-size: 2rem;
            animation: fadeIn 1.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        section {
            padding: 30px;
            text-align: center;
        }
        .features, .scents {
            background-color: #f9f9f9;
            padding: 50px 20px;
        }
        .accent {
            color: gold;
        }
    </style>
</head>
<body>
    <header>
        <h1>AURA</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#scents">Scents</a></li>
            </ul>
        </nav>
    </header>
    <div class="hero">
        <h2>Welcome to AURA</h2>
    </div>
    <section class="features">
        <h3 class="accent">Features</h3>
        <!-- Features Content Here -->
    </section>
    <section class="scents">
        <h3 class="accent">Scents</h3>
        <!-- Scents Content Here -->
    </section>
</body>
</html>
